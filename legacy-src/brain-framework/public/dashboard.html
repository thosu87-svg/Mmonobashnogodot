<!doctype html>
<html lang="de"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Brain Dashboard</title><style>
body{background:#0c1322;color:#e7f0ff;font-family:Arial,sans-serif;margin:0;padding:20px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(220px,1fr));gap:16px}
.card{background:#151f34;border-radius:16px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
pre{white-space:pre-wrap;word-wrap:break-word}
</style></head><body><h1>World Brain Dashboard</h1><div class="grid">
<div class="card"><h3>Metrics</h3><pre id="metrics"></pre></div>
<div class="card"><h3>Guilds</h3><pre id="guilds"></pre></div>
<div class="card"><h3>Brain Actions</h3><pre id="actions"></pre></div>
<div class="card"><h3>Players</h3><pre id="players"></pre></div>
<div class="card"><h3>NPCs</h3><pre id="npcs"></pre></div>
<div class="card"><h3>Market</h3><pre id="market"></pre></div>
</div><script type="module" src="/dashboard.js"></script></body></html>
